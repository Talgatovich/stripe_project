<html>  
    
    <head>
        <title>Купить товар </title>

    </head>

    <body>
        <h3><a href = "{% url 'api:items'%}"> На главную </a> </h3>
        
        <h1>{{ item.name }}</h1>
        <p>{{ item.description }}</p>
        <p>{{ item.price }}</p>
        <p>{{ session.id }}</p>
        <form action="{% url 'api:buy' item.id %}" method="GET">
            <button type="submit">Купить</button>
        </form>


        {% comment %} <input type="button" onclick="location.href='items/buy/1';" value="Go to Google" /> {% endcomment %}

        <button id='buy-button'>Buy</button>

        <script src="https://js.stripe.com/v3/"></script>     
        
        <script type="text/javascript">            

            var buyButton = document.getElementById('buy-button');

            buyButton.addEventListener('click', event => {
            fetch("{% url 'api:buy' item.id %}", {method: 'GET'})
            .then(result => {return result.json()})
            .then((data) => {
                var stripe = Stripe(data.stripe_pub_key);
                stripe.redirectToCheckout({ 
                    sessionId: data.session_id 
                }).then(function (result) {});        
            })
        })
        </script>

        
        
    </body>

</html>
